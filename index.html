<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="team-container">
        <h2>HOME</h2>
        <div class="score"><span id="sc1">0</span></div>
        <div class="btn-container">
          <button onclick="addPoints('home', 1)">+1</button>
          <button onclick="addPoints('home', 2)">+2</button>
          <button onclick="addPoints('home', 3)">+3</button>
        </div>
      </div>
      <div class="team-container">
        <h2>AWAY</h2>
        <div class="score"><span id="sc2">0</span></div>
        <div class="btn-container">
          <button onclick="addPoints('guest', 1)">+1</button>
          <button onclick="addPoints('guest', 2)">+2</button>
          <button onclick="addPoints('guest', 3)">+3</button>
        </div>
      </div>
      <div class="reset-container">
        <button id="reset-btn" onclick="resetGame()">Reset game</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
